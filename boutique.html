<body>
  <div class="announce" data-i18n="announce"></div>
  <header class="site-header">
    <div class="wrap header-inner">

      <nav class="nav" data-nav>
        <a class="nav-link" href="boutique.html" data-i18n="nav.shop"></a>
        <a class="nav-link" href="histoire.html" data-i18n="nav.story"></a>
        <a class="nav-link" href="faq.html" data-i18n="nav.faq"></a>
        <div class="lang-switch"><button data-lang-btn="fr">FR</button><button data-lang-btn="en">EN</button></div>
      </nav>
      <div class="header-actions">
        <div class="lang-switch"><button data-lang-btn="fr">FR</button><button data-lang-btn="en">EN</button></div>
        <button class="cart-btn" data-open-cart aria-label="Cart" data-i18n-attr="aria-label:nav.cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>

          <div class="band" data-reveal>
            <h2 data-i18n="home.custom.title"></h2>
            <p data-i18n="home.custom.body"></p>
            <a class="btn btn-outline" href="#" data-ig-link target="_blank" rel="noopener" data-i18n="home.custom.cta"></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="brand"><span class="brand__word">RACYN.</span><span class="brand__sub">Clothing</span></div>
          <p data-i18n="footer.tagline"></p>
        </div>
        <div class="footer-col"><h4 data-i18n="footer.shop"></h4><a href="boutique.html" data-i18n="nav.shop"></a><a href="produit.html?id=signature-tote">Signature Tote</a><a href="produit.html?id=olive-bucket">Olive Bucket</a></div>

    <div class="cart-head"><h2 data-i18n="cart.title"></h2><button class="cart-close" data-close-cart aria-label="Close">&times;</button></div>
    <div class="cart-body" data-cart-items></div>
    <div class="cart-foot" data-cart-summary hidden>
      <div class="cart-line"><span data-i18n="cart.subtotal"></span><span data-sub></span></div>
      <div class="cart-line"><span data-i18n="cart.shipping"></span><span data-ship></span></div>

  <script src="js/data.js"></script>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
